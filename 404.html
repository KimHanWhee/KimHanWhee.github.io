<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>김한휘 | Backend Developer Portfolio</title>
    <script>
      // GitHub Pages SPA redirect
      // pathSegmentsToKeep = 0 (root domain: kimhanwhee.github.io)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
